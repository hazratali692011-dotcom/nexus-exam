function registerStudent(){

let name =
document.getElementById('name').value.trim();

let phone =
document.getElementById('phone').value.trim();

let email =
document.getElementById('email').value.trim();

let course =
document.getElementById('course').value.trim();

let institute =
document.getElementById('institute').value.trim();

let batch =
document.getElementById('batch').value.trim();

let password =
document.getElementById('password').value.trim();

if(
!name ||
!phone ||
!email ||
!course ||
!institute ||
!batch ||
!password
){

alert('Please Fill All Fields');

return;

}

let studentId =

'STD' +

String(
Date.now()
).slice(-4);

let registerButton =

document.getElementById(
'registerBtn'
);

if(registerButton){

registerButton.disabled = true;

registerButton.innerHTML =
'Registering... Please Wait';

registerButton.style.opacity = '.7';

registerButton.style.cursor =
'not-allowed';

}

let data={

action:'register',

id:studentId,

name:name,

phone:phone,

email:email,

course:course,

institute:institute,

batch:batch,

password:password

};

fetch(scriptURL,{

method:'POST',

body:JSON.stringify(data)

})

.then(r=>r.text())

.then(()=>{

localStorage.setItem(
'studentId',
studentId
);

alert(

'Registration Successful\n\nYour ID : '

+

studentId +

'\n\nPlease Save This ID'

);

document.getElementById('name').value='';
document.getElementById('phone').value='';
document.getElementById('email').value='';
document.getElementById('course').value='';
document.getElementById('institute').value='';
document.getElementById('batch').value='';
document.getElementById('password').value='';

showLoginForm();

document.getElementById(
'loginId'
).value = studentId;

})

.catch(()=>{

if(registerButton){

registerButton.disabled = false;

registerButton.innerHTML =
'Register Now';

registerButton.style.opacity = '1';

registerButton.style.cursor =
'pointer';

}

alert(
'Server Error. Please try again.'
);

});

}

function loginStudent(){

let id =
document.getElementById(
'loginId'
).value.trim();

let password =
document.getElementById(
'loginPassword'
).value.trim();

if(!id || !password){

alert('Enter ID & Password');

return;

}

let loginButton =

document.getElementById(
'loginBtn'
);

if(loginButton){

loginButton.disabled = true;

loginButton.innerHTML =
'Logging in... Please Wait';

loginButton.style.opacity = '.7';

loginButton.style.cursor =
'not-allowed';

}
fetch(scriptURL,{

method:'POST',

body:JSON.stringify({

action:'login',

id:id,

password:password

})

})

.then(res=>res.json())

.then(data=>{

if(data.status==='SUCCESS'){

localStorage.setItem(
'studentData',
JSON.stringify(data)
);

alert(
'Login Successful'
);

showStudentDashboard();

}else{

if(loginButton){

loginButton.disabled = false;

loginButton.innerHTML =
'Login';

loginButton.style.opacity = '1';

loginButton.style.cursor =
'pointer';

}

alert(
'Wrong ID Or Password'
);

}

})

.catch(()=>{

if(loginButton){

loginButton.disabled = false;

loginButton.innerHTML =
'Login';

loginButton.style.opacity = '1';

loginButton.style.cursor =
'pointer';

}

alert(
'Server Error. Please try again.'
);

});
}

function loadStudents(){

fetch(scriptURL,{

method:'POST',

body:JSON.stringify({

action:'getStudents'

})

})

.then(res=>res.json())

.then(rows=>{

let html='';

html += '<h3>Student List</h3>';

html += '<table border="1" width="100%">';

html += '<tr>';

html += '<th>ID</th>';
html += '<th>Name</th>';
html += '<th>Phone</th>';
html += '<th>Email</th>';
html += '<th>Status</th>';
html += '<th>Premium</th>';
html += '<th>Action</th>';
html += '</tr>';

rows.forEach(r=>{

html += '<tr>';

html += '<td>'+r.id+'</td>';

html += '<td>'+r.name+'</td>';

html += '<td>'+r.phone+'</td>';

html += '<td>'+r.email+'</td>';

html += '<td>'+r.status+'</td>';

html += '<td>';

if(r.premiumStatus=='PAID'){

html += '<b style="color:#86efac;">PAID</b><br>';

html += '<button onclick="deactivatePremium(\''+r.id+'\')">';
html += 'Deactivate';
html += '</button>';

}else{

html += '<b style="color:#fcd34d;">FREE</b><br>';

html += '<button onclick="activatePremium(\''+r.id+'\')">';
html += 'Activate Premium';
html += '</button>';

}

html += '</td>';

html += '<td>';

html += '<button onclick="viewStudent(\''+r.id+'\')">Profile</button> ';

if(r.status=='ACTIVE'){

html += '<button onclick="blockStudent(\''+r.id+'\')">Block</button>';

}else{

html += '<button onclick="unblockStudent(\''+r.id+'\')">Unblock</button>';

}

html += '</td>';

html += '</tr>';

});

html += '</table>';

document.getElementById(
'studentArea'
).innerHTML = html;

});

}


function activatePremium(id){

let expiry = prompt(
'Premium expiry date লিখুন\nExample: 31-12-2026'
);

if(!expiry){
return;
}

fetch(scriptURL,{

method:'POST',

body:JSON.stringify({

action:'activatePremium',

id:id,

expiry:expiry

})

})

.then(res=>res.json())

.then(data=>{

alert('Premium Activated Successfully');

loadStudents();

});

}


function deactivatePremium(id){

let ok = confirm(
'এই student-এর Premium বন্ধ করবেন?'
);

if(!ok){
return;
}

fetch(scriptURL,{

method:'POST',

body:JSON.stringify({

action:'deactivatePremium',

id:id

})

})

.then(res=>res.json())

.then(data=>{

alert('Premium Deactivated');

loadStudents();

});

}

function viewStudent(id){

fetch(scriptURL,{

method:'POST',

body:JSON.stringify({

action:'getStudents'

})

})

.then(res=>res.json())

.then(rows=>{

let student = rows.find(
x => x.id == id
);

if(!student){
return;
}

document.getElementById(
'studentArea'
).innerHTML = `

<div class="card">

<h2>Student Profile</h2>

<p><b>Name:</b> ${student.name}</p>

<p><b>ID:</b> ${student.id}</p>

<p><b>Phone:</b> ${student.phone}</p>

<p><b>Email:</b> ${student.email}</p>

<p><b>Course:</b> ${student.course}</p>

<p><b>Institute:</b> ${student.institute}</p>

<p><b>Batch:</b> ${student.batch}</p>

<p><b>Status:</b> ${student.status}</p>

<br>

<button onclick="loadStudents()">
Back To List
</button>

</div>

`;

});

}

function createExam(){

let examNo =
document.getElementById(
'examNo'
).value.trim();

let examName =
document.getElementById(
'examName'
).value.trim();

let totalQuestion =
document.getElementById(
'totalQuestion'
).value.trim();

let totalMark =
document.getElementById(
'totalMark'
).value.trim();

let duration =
document.getElementById(
'duration'
).value.trim();

let examCategory =
document.getElementById(
'examCategory'
).value;

if(

!examNo ||

!examName ||

!totalQuestion ||

!totalMark ||

!duration

){

alert(
'Fill All Fields'
);

return;

}

fetch(scriptURL,{

method:'POST',

body:JSON.stringify({

action:'createExam',

examNo:examNo,

examName:examName,

totalQuestion:totalQuestion,

totalMark:totalMark,

duration:duration,

examCategory:examCategory

})

})

.then(res=>res.json())

.then(data=>{

console.log(data);

alert(
JSON.stringify(data)
);

if(data.status=='SUCCESS'){

alert(
'Exam Created Successfully'
);

showCreateExamForm();

}

})

.catch(error=>{

console.log(error);

alert(
'ERROR : ' + error
);

});

}

function loadExams(){

fetch(scriptURL,{

method:'POST',

body:JSON.stringify({

action:'getExams'

})

})

.then(res=>res.json())

.then(rows=>{

let html='';

html += '<h3>Exam List</h3>';

html += '<table border="1" width="100%">';

html += '<tr>';

html += '<th>Exam No</th>';

html += '<th>Exam Name</th>';

html += '<th>Questions</th>';

html += '<th>Added</th>';

html += '<th>Marks</th>';

html += '<th>Duration</th>';

html += '<th>Status</th>';
html += '<th>Category</th>';
html += '<th>Action</th>';

html += '</tr>';

rows.forEach(r=>{

html += '<tr>';

html += '<td>'+r.examNo+'</td>';

html += '<td>'+r.examName+'</td>';

html += '<td>'+r.totalQuestion+'</td>';

html += '<td id="count_'+r.examNo+'">Loading...</td>';

html += '<td>'+r.totalMark+'</td>';

html += '<td>'+r.duration+'</td>';

html += '<td>'+r.status+'</td>';
html += '<td>'+r.examCategory+'</td>';
html += '<td>';

html += '<button onclick="deleteExam(\''+r.examNo+'\')">Delete</button>';

html += '</td>';

html += '</tr>';

});

setTimeout(()=>{

rows.forEach(r=>{

fetch(scriptURL,{

method:'POST',

body:JSON.stringify({

action:'getExamQuestionCount',

examNo:r.examNo

})

})

.then(res=>res.json())

.then(data=>{

let cell = document.getElementById(
'count_'+r.examNo
);

if(cell){

cell.innerHTML = data.count;

}

});

});

},300);

html += '</table>';

document.getElementById(
'studentArea'
).innerHTML = html;

});

}

function formatResultDate(value){

if(!value){
return '-';
}

let d = new Date(value);

if(isNaN(d.getTime())){
return value;
}

return d.toLocaleDateString(
'en-GB',
{
day:'2-digit',
month:'short',
year:'numeric'
}
);

}

function submitExam(){

for(

i<window.examQuestions.length;

i++

){

!window.studentAnswers[i]
){

unanswered++;

}

}

'আপনি কি Final Submit করতে চান?';

if(unanswered > 0){

message +=

'\n\n⚠ এখনও ' +

unanswered +

'\n\nUnanswered question থাকলেও Submit করতে চান?';

return;

}

document.querySelectorAll(
'input[name="ans"]:checked'
);

if(checked.length==1){

window.studentAnswers[
window.currentQuestion
] = checked[0].value;

}

else if(checked.length>1){

let arr=[];

checked.forEach(x=>{

arr.push(x.value);

});

window.studentAnswers[
window.currentQuestion
] = arr.join(',');

}

let answered = 0;

for(
let i=0;
i<window.examQuestions.length;
i++
){

if(
window.studentAnswers[i]
){

answered++;

}

}

let notAnswered =

window.examQuestions.length
-
answered;

let confirmSubmit =

confirm(

'Final Submit?\n\n' +

'Answered : ' +

answered +

'\n\n' +

'Not Answered : ' +

notAnswered +

'\n\n' +

'You cannot change answers after submit.'

);

if(!confirmSubmit){

}

);

'not-allowed';

i++

window.examQuestions[i]
.correctAnswer;

userAnswer.toUpperCase()
==
correctAnswer.toUpperCase()

){

/
total
).toFixed(2);

let student =

JSON.parse(

localStorage.getItem(

);

let answerHistoryList = [];

i<window.examQuestions.length;

i++

){

<div style="
font-size:52px;
font-weight:900;
color:#a78bfa;
line-height:1;
">
${r.percentage}%
</div>

<p style="
color:#94a3b8;
margin-top:8px;
">
Your Score: ${r.correct} / ${r.total}
</p>

</div>

<div style="
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
text-align:left;
">

<div style="
background:#0f172a;
border-radius:12px;
padding:13px;
">
<span style="color:#94a3b8;">Answered</span>
<br>
<b style="font-size:22px;">${r.answered}</b>
</div>

<div style="
background:#0f172a;
border-radius:12px;
padding:13px;
">
<span style="color:#94a3b8;">Correct</span>
<br>
<b style="font-size:22px;color:#86efac;">${r.correct}</b>
</div>

<div style="
background:#0f172a;
border-radius:12px;
padding:13px;
">
<span style="color:#94a3b8;">Wrong</span>
<br>
<b style="font-size:22px;color:#fca5a5;">${r.wrong}</b>
</div>

<div style="
background:#0f172a;
border-radius:12px;
padding:13px;
">
<span style="color:#94a3b8;">Not Answered</span>
<br>
<b style="font-size:22px;color:#fcd34d;">${r.total-r.answered}</b>
</div>

</div>
<button
style="
width:100%;
margin-top:12px;
font-size:16px;
background:#312e81;
"
onclick="showExamReview()">
View Answer Review
</button>
<button
style="
width:100%;
margin-top:22px;
font-size:16px;
"
onclick="showStudentDashboard()">
Back To Dashboard
</button>

</div>

</div>

`;

}


function showExamReview(){

let html = '';

html += '<div style="';
html += 'max-width:750px;';
html += 'margin:10px auto;';
html += 'padding:14px;';
html += '">';

html += '<h2 style="text-align:center;color:#c4b5fd;">Answer Review</h2>';

for(let i=0;i<window.examQuestions.length;i++){

let q = window.examQuestions[i];

let userAnswer = window.studentAnswers[i] || 'Not Answered';

let correctAnswer = q.correctAnswer || '';

let isCorrect =

userAnswer != 'Not Answered' &&

userAnswer.toUpperCase() == correctAnswer.toUpperCase();

html += '<div style="';
html += 'background:#1e293b;';
html += 'border:1px solid ' + (isCorrect ? '#166534' : '#7f1d1d') + ';';
html += 'border-radius:14px;';
html += 'padding:16px;';
html += 'margin:12px 0;';
html += '">';

html += '<div style="font-weight:bold;color:#e9d5ff;margin-bottom:10px;">';
html += 'Q' + (i+1) + '. ' + q.question;
html += '</div>';

html += '<p style="margin:6px 0;color:#cbd5e1;">a. ' + q.optionA + '</p>';
html += '<p style="margin:6px 0;color:#cbd5e1;">b. ' + q.optionB + '</p>';
html += '<p style="margin:6px 0;color:#cbd5e1;">c. ' + q.optionC + '</p>';
html += '<p style="margin:6px 0;color:#cbd5e1;">d. ' + q.optionD + '</p>';

if(q.questionType == 'TRUE_FALSE'){

html += '<p style="margin:6px 0;color:#cbd5e1;">e. ' + q.optionE + '</p>';

}

html += '<hr>';

html += '<p style="margin:8px 0;">';
html += '<b>Your Answer:</b> ';
html += '<span style="color:' + (isCorrect ? '#86efac' : '#fca5a5') + ';">';
html += userAnswer;
html += '</span>';
html += '</p>';

html += '<p style="margin:8px 0;">';
html += '<b>Correct Answer:</b> ';
html += '<span style="color:#86efac;">';
html += correctAnswer;
html += '</span>';
html += '</p>';

html += '<b style="color:' + (isCorrect ? '#86efac' : '#fca5a5') + ';">';
html += isCorrect ? '✓ Correct' : '✗ Wrong';
html += '</b>';

html += '</div>';

}

html += '<button style="width:100%;margin:15px 0;" onclick="showResultPage()">';
html += 'Back To Result';
html += '</button>';

html += '</div>';

document.getElementById(
'contentArea'
).innerHTML = html;

}

function previousQuestion(){
if(
window.currentQuestion <= 0
){

return;

}

let checked = document.querySelectorAll(
'input[name="ans"]:checked'
);

let selectedAnswers = [];

checked.forEach(item=>{

selectedAnswers.push(item.value);

});

if(selectedAnswers.length > 0){

window.studentAnswers[
window.currentQuestion
] = selectedAnswers.join(',');

}

let previousIndex =
window.currentQuestion - 1;

showExamQuestion(
window.examQuestions,
previousIndex
);

}

localStorage.removeItem(
'studentData'
);

location.reload();

}

localStorage.getItem(
'studentData'
)

){

}

localStorage.getItem(
'adminLogin'
)

){

showAdminDashboard();

}
