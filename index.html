function registerStudent(){

let name =
document.getElementById('name').value.trim();

let phone =
document.getElementById('phone').value.trim();

let email =
document.getElementById('email').value.trim();

let course =
document.getElementById('course').value.trim();

let institute =
document.getElementById('institute').value.trim();

let batch =
document.getElementById('batch').value.trim();

let password =
document.getElementById('password').value.trim();

if(
!name ||
!phone ||
!email ||
!course ||
!institute ||
!batch ||
!password
){

alert('Please Fill All Fields');

return;

}

let studentId =

'STD' +

String(
Date.now()
).slice(-4);

let data={

action:'register',

id:studentId,

name:name,

phone:phone,

email:email,

course:course,

institute:institute,

batch:batch,

password:password

};

fetch(scriptURL,{

method:'POST',

body:JSON.stringify(data)

})

.then(r=>r.text())

.then(()=>{

localStorage.setItem(
'studentId',
studentId
);

alert(

'Registration Successful\n\nYour ID : '

+

studentId +

'\n\nPlease Save This ID'

);

document.getElementById('name').value='';
document.getElementById('phone').value='';
document.getElementById('email').value='';
document.getElementById('course').value='';
document.getElementById('institute').value='';
document.getElementById('batch').value='';
document.getElementById('password').value='';

document.getElementById(
'loginId'
).value = studentId;

document.getElementById(
'loginPassword'
).value = '';

})

.catch(()=>{

alert(
'Server Error'
);

});

}

function parseMcq(){

let text =
document.getElementById(
'mcqText'
).value.trim();

if(!text){

alert(
'Paste MCQ First'
);

return;

}

let lines =
text.split('\n')
.filter(x=>x.trim());

let question='';

let optionA='';
let optionB='';
let optionC='';
let optionD='';

let answer='';

lines.forEach(line=>{

line=line.trim();

if(
line.startsWith('a.')
){

optionA =
line.replace('a.','').trim();

}

else if(
line.startsWith('b.')
){

optionB =
line.replace('b.','').trim();

}

else if(
line.startsWith('c.')
){

optionC =
line.replace('c.','').trim();

}

else if(
line.startsWith('d.')
){

optionD =
line.replace('d.','').trim();

}

else if(
line.toLowerCase()
.includes('correct ans')
){

let parts =
line.split(':');

if(parts.length>1){

answer =
parts[1]
.trim()
.charAt(0)
.toUpperCase();

}

}

else{

if(
!question &&
!line.match(/^\d+\./)
){

question=line;

}

if(
line.match(/^\d+\./)
){

question=line
.replace(/^\d+\./,'')
.trim();

}

}

function parseTf(){

let text =
document.getElementById(
'tfText'
).value.trim();

if(!text){

alert(
'Paste True/False First'
);

return;

}

let lines =
text.split('\n')
.filter(x=>x.trim());

let question='';

let optionA='';
let optionB='';
let optionC='';
let optionD='';
let optionE='';

let answer='';

lines.forEach(line=>{

line=line.trim();

if(
line.startsWith('a.')
){

optionA =
line.replace('a.','').trim();

}

else if(
line.startsWith('b.')
){

optionB =
line.replace('b.','').trim();

}

else if(
line.startsWith('c.')
){

optionC =
line.replace('c.','').trim();

}

else if(
line.startsWith('d.')
){

optionD =
line.replace('d.','').trim();

}

else if(
line.startsWith('e.')
){

optionE =
line.replace('e.','').trim();

}

else if(
line.toLowerCase()
.includes('true ans')
){

let parts =
line.split(':');

if(parts.length>1){

answer =
parts[1]
.trim()
.toUpperCase();

}

}

else{

if(
line.match(/^\d+\./)
){

question =
line.replace(/^\d+\./,'')
.trim();

}

}

});

'tfResult'
).innerHTML = `

function startTimer(){

window.examDuration * 60;

window.examTimer =

setInterval(function(){

Math.floor(
totalSeconds / 60
);

let seconds =

totalSeconds % 60;

String(minutes)
.padStart(2,'0')

+

':'

+

String(seconds)
.padStart(2,'0');

let timerDiv =

document.getElementById(
'timerArea'
);

if(timerDiv){

timerDiv.innerHTML =
timerText;

}

totalSeconds--;

if(totalSeconds < 0){

clearInterval(
window.examTimer
);

alert(
'Time Over'
);

submitExam();

}

},1000);

}

window.examQuestions,

previousIndex

);

}

function logoutStudent(){

localStorage.removeItem(
'studentData'
);

location.reload();

}

if(

localStorage.getItem(
'studentData'
)

){

showStudentDashboard();

}

if(

localStorage.getItem(
'adminLogin'
)

){

showAdminDashboard();

}
</script>
